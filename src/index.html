<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paweł Bartoszewski — Full-stack Developer (Angular, .NET, JS)</title>
    <meta name="description" content="Paweł Bartoszewski — Full-stack Developer. Portfolio dostępne w języku polskim i angielskim.">
    <meta name="robots" content="noindex,follow">

    <!-- Hreflang (SEO) -->
    <link rel="alternate" hreflang="pl" href="https://pbartoszewski.pl/pl/index.html">
    <link rel="alternate" hreflang="en" href="https://pbartoszewski.pl/en/index.html">
    <link rel="alternate" hreflang="x-default" href="https://pbartoszewski.pl/pl/index.html">
    <link rel="canonical" href="https://pbartoszewski.pl/pl/index.html">

    <!-- Fallback: po 0s meta-refresh na polską wersję (domyślną dla PL-owej grupy odbiorców) -->
    <meta http-equiv="refresh" content="0;url=/pl/index.html">
    <script>
        (function () {
            try {
                var lang = (navigator.language || navigator.userLanguage || 'pl').toLowerCase();
                var target = lang.indexOf('en') === 0 ? '/en/index.html' : '/pl/index.html';
                window.location.replace(target);
            } catch (e) {
                window.location.replace('/pl/index.html');
            }
        })();
    </script>
</head>
<body>
    <p>
        Strona dostępna w wersji
        <a href="/pl/index.html">polskiej</a>
        oraz
        <a href="/en/index.html">angielskiej</a>.
    </p>
    <p>
        Site available in
        <a href="/en/index.html">English</a>
        and
        <a href="/pl/index.html">Polish</a>.
    </p>
</body>
</html>
