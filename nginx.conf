server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Mapujemy Accept-Language na kod języka (en/pl)
    # Jeżeli przeglądarka zgłasza "en..." -> en; w pozostałych przypadkach domyślnie pl.
    # Dzięki temu strona polska (kierowana do polskich odbiorców) wyświetla się jako fallback.
    set $lang "pl";
    if ($http_accept_language ~* "^en") {
        set $lang "en";
    }

    # Wejście na "/" lub "/index.html" -> 302 redirect do /pl/ lub /en/
    location = / {
        return 302 /$lang/index.html;
    }
    location = /index.html {
        return 302 /$lang/index.html;
    }

    # Ładne URL-e: /pl i /en -> dociągają index.html
    location = /pl { return 302 /pl/index.html; }
    location = /en { return 302 /en/index.html; }
    location = /pl/ { try_files /pl/index.html =404; }
    location = /en/ { try_files /en/index.html =404; }

    # Cały pozostały ruch (zasoby, podstrony językowe) serwujemy statycznie
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache dla zasobów statycznych
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Standardowe nagłówki bezpieczeństwa
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
