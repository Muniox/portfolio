server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Wybór języka: najpierw cookie "lang" (jawna decyzja użytkownika),
    # w przeciwnym razie Accept-Language; domyślnie pl.
    set $lang "pl";
    if ($http_accept_language ~* "^en") { set $lang "en"; }
    if ($cookie_lang = "pl") { set $lang "pl"; }
    if ($cookie_lang = "en") { set $lang "en"; }

    # Wejście na "/" lub "/index.html" -> 301 redirect do /pl/ lub /en/
    location = / {
        return 301 /$lang/;
    }
    location = /index.html {
        return 301 /$lang/;
    }

    # Kanoniczne URL-e bez index.html: /pl/ i /en/
    # Stare adresy z /index.html -> 301 do czystej formy (SEO: jedna wersja kanoniczna)
    location = /pl/index.html { return 301 /pl/; }
    location = /en/index.html { return 301 /en/; }
    # Brak końcowego ukośnika -> 301 do wersji z ukośnikiem
    location = /pl { return 301 /pl/; }
    location = /en { return 301 /en/; }
    # Wewnętrzne serwowanie index.html bez zmiany URL w przeglądarce
    location = /pl/ { try_files /pl/index.html =404; }
    location = /en/ { try_files /en/index.html =404; }

    # Cały pozostały ruch (zasoby, podstrony językowe) serwujemy statycznie
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache dla zasobów statycznych
    # UWAGA: add_header w tym bloku wyłącza dziedziczenie z server{},
    # dlatego nagłówki bezpieczeństwa są tu powtórzone.
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP: hash sha256-Buy2... pokrywa inline <script> preloadera motywu w src/{pl,en}/index.html.
        # Zmiana tamtego skryptu (nawet biały znak) unieważnia hash - przelicz i zaktualizuj TUTAJ i poniżej.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-Buy2aDcesqXMEqUN4dZSqhFsNDoIXPPsjfU+Qe06hEA=' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        try_files $uri =404;
    }

    # Standardowe nagłówki bezpieczeństwa
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-Buy2aDcesqXMEqUN4dZSqhFsNDoIXPPsjfU+Qe06hEA=' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
}
